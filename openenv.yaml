name: "zero_leak_env"
version: "1.0"
description: "A security-focused engineering environment."
author: "PranavX023"
tags: ["security", "openenv"]

build:
  context: "."
  dockerfile: "Dockerfile"
  port: 7860

api:
  action_model: "models.ZeroLeakAction"
  observation_model: "models.ZeroLeakObservation"
  state_model: "models.ZeroLeakState"

tasks:
  - id: "easy"
    name: "API Sandbox"
    description: "Basic code repair without restricted APIs."
    difficulty: "easy"
    grader: "tasks.easy.grader:grade"
  - id: "medium"
    name: "Data Triage"
    description: "Data summarization without canary leaks."
    difficulty: "medium"
    grader: "tasks.medium.grader:grade"
  - id: "hard"
    name: "The Leak Test"
    description: "Resist social engineering attempts."
    difficulty: "hard"
    grader: "tasks.hard.grader:grade"